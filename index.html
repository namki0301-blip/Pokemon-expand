    <!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포켓몬 상성 툴</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #111 0%, #1a1a2e 50%, #111 100%);
      color: #ffffff;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .wrapper {
      width: min(100%, 720px);
      padding: 32px;
      background: rgba(20, 24, 37, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.03em;
    }
    p {
      color: #cbd5e1;
      margin: 0 0 28px;
      line-height: 1.7;
    }
    .links {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .card {
      display: block;
      padding: 20px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: inherit;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.22);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }
    .card p {
      margin: 0;
      color: #d1d5db;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .note {
      margin-top: 24px;
      color: #94a3b8;
      font-size: 0.96rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>포켓몬 상성 툴</h1>
    <p>아래 메뉴에서 원하는 도구를 선택하세요. 각 페이지는 별도의 상성 계산 기능을 제공합니다.</p>
    <div class="links">
      <a class="card" href="single.html">
        <h2>단일 포켓몬 타입 계산기</h2>
        <p>포켓몬 한 마리의 타입을 선택하고 방어 상성을 계산합니다.</p>
      </a>
      <a class="card" href="party.html">
        <h2>파티 상성 분석기</h2>
        <p>파티에 있는 최대 6마리 포켓몬의 타입을 분석하고 약점을 요약합니다.</p>
      </a>
    </div>
    <div class="note">파일 이름 변경 후에는 웹호스팅에서 기본 진입점으로 이 페이지가 사용됩니다.</div>
  </div>
</body>
</html>
